<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Évaluation Risque Assurance</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>Assurance Habitation</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#prediction" class="nav-link active">Évaluer mon risque</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <!-- Section Prédiction -->
        <section id="prediction" class="tab-content active">
            <div class="section-header">
                <h2>Evaluation du risque</h2>
                <p>Remplissez les informations sur votre logement</p>
            </div>

            <form id="predictionForm" class="form-container">
                <div class="form-grid">
                    <!-- Colonne 1 - Informations générales -->
                    <div class="form-column">
                        <div class="form-group">
                            <label for="year">Année</label>
                            <input type="range" id="year" name="year" min="2010" max="2025" value="2024" class="slider">
                            <span class="slider-value" id="yearValue">2024</span>
                        </div>

                        <div class="form-group">
                            <label for="buildingDimension">Surface (m²)</label>
                            <input type="number" id="buildingDimension" name="buildingDimension" min="10" max="10000" value="100" placeholder="Ex: 100">
                        </div>

                        <div class="form-group">
                            <label for="buildingType">Type de logement</label>
                            <select id="buildingType" name="buildingType">
                                <option value="0">Maison</option>
                                <option value="1">Appartement</option>
                                <option value="2">Villa</option>
                                <option value="3">Immeuble</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="settlement">Localisation</label>
                            <select id="settlement" name="settlement">
                                <option value="1">Zone urbaine</option>
                                <option value="0">Zone rurale</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="numWindows">Nombre de fenêtres</label>
                            <input type="number" id="numWindows" name="numWindows" min="0" max="20" value="5" placeholder="Ex: 5">
                        </div>
                    </div>

                    <!-- Colonne 2 - Caractéristiques -->
                    <div class="form-column">
                        <div class="form-group">
                            <label for="insuredPeriod">Durée d'assurance</label>
                            <select id="insuredPeriod" name="insuredPeriod">
                                <option value="1.0">1 an</option>
                                <option value="0.5">6 mois</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="residential">Usage résidentiel</label>
                            <select id="residential" name="residential">
                                <option value="1">Oui</option>
                                <option value="0">Non</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="buildingPainted">Façade peinte</label>
                            <select id="buildingPainted" name="buildingPainted">
                                <option value="1">Oui</option>
                                <option value="0">Non</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="buildingFenced">Clôture</label>
                            <select id="buildingFenced" name="buildingFenced">
                                <option value="1">Oui</option>
                                <option value="0">Non</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="garden">Jardin</label>
                            <select id="garden" name="garden">
                                <option value="1">Oui</option>
                                <option value="0">Non</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="geoCode">Code géographique</label>
                            <input type="number" id="geoCode" name="geoCode" min="0" max="100" value="1" placeholder="Ex: 1">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-large">Analyser mon risque</button>
            </form>

            <!-- Zone de résultat -->
            <div id="resultContainer" class="result-container" style="display: none;">
                <div id="resultContent"></div>
            </div>
        </section>

    </main>

    <footer>
        <p>Assurance Habitation © 2025 - Évaluation intelligente de risques</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
